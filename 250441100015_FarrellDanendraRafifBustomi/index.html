<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Data Mahasiswa</title>
</head>
<body>
    <form action="">
        <h1>Daftar Data Mahasiswa</h1>
        <label for="nama">Nama Mahasiswa:</label>
        <input type="text" id="nama" placeholder="Nama Mahasiswa">
        <br><br>
        <label for="nim">NIM Mahasiswa:</label>
        <input type="Number" id="nim" placeholder="NIM Mahasiswa">
        <br><br>
        <label for="email">Email Mahasiswa:</label>
        <input type="Email" id="email" placeholder="Email Mahasiswa">
        <br><br>
        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="Masukkan Password">
        <br><br>
        <label for="laki-laki">Jenis Kelamin:</label>
        <input type="radio" name="jenis_kelamin" id="laki-laki">
        <label for="laki-laki">Laki-laki</label>
        <input type="radio" name="jenis_kelamin" id="perempuan">
        <label for="perempuan">Perempuan</label>
        <br><br>
        <input type="button" value="Submit">
    </form>
</body>
</html>
